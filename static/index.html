<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法律智能助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1a3a5c 0%,#2d5f8a 100%);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:10}
.header .icon{font-size:32px;line-height:1}
.header .title{font-size:22px;font-weight:600}
.header .subtitle{font-size:13px;opacity:.8;margin-top:2px}
.header .status{margin-left:auto;font-size:13px;padding:4px 12px;border-radius:12px;background:rgba(255,255,255,.15)}
.header .status.ready{background:rgba(76,175,80,.6)}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.welcome{text-align:center;color:#999;margin:auto 0}
.welcome h2{font-size:24px;color:#555;margin-bottom:12px}
.welcome p{font-size:14px;line-height:1.8}
.quick-questions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.quick-btn{background:#fff;border:1px solid #d9d9d9;border-radius:8px;padding:8px 16px;font-size:13px;color:#2d5f8a;cursor:pointer;transition:all .2s}
.quick-btn:hover{border-color:#2d5f8a;background:#e8f0fe}
.msg{display:flex;gap:10px;max-width:80%;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.msg .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg.user .avatar{background:#2d5f8a;color:#fff}
.msg.bot .avatar{background:#e8f0fe;color:#2d5f8a}
.msg .bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;word-break:break-word}
.msg.user .bubble{background:#2d5f8a;color:#fff;border-bottom-right-radius:4px}
.msg.bot .bubble{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.typing .bubble::after{content:"";display:inline-block;width:4px;height:4px;background:#999;border-radius:50%;margin-left:2px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.input-bar{padding:12px 20px;background:#fff;border-top:1px solid #e8e8e8;display:flex;gap:10px;align-items:flex-end}
.input-bar textarea{flex:1;border:1px solid #d9d9d9;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;resize:none;outline:none;max-height:120px;min-height:42px;line-height:1.5;transition:border-color .2s}
.input-bar textarea:focus{border-color:#2d5f8a}
.input-bar textarea::placeholder{color:#bbb}
.send-btn{background:#2d5f8a;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;transition:background .2s;white-space:nowrap;height:42px}
.send-btn:hover{background:#1a3a5c}
.send-btn:disabled{background:#b0c4de;cursor:not-allowed}
.sidebar{width:0;overflow:hidden;background:#fff;border-right:1px solid #e8e8e8;transition:width .3s}
.sidebar.open{width:260px}
.sidebar-header{padding:14px 16px;font-size:15px;font-weight:600;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.sidebar-list{list-style:none;padding:8px}
.sidebar-list li{padding:10px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-list li:hover{background:#f5f5f5}
.sidebar-list li .del{float:right;color:#ccc;font-size:12px}
.sidebar-list li .del:hover{color:#ff4d4f}
.menu-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#fff;padding:4px 8px}
</style>
</head>
<body>
<div class="header">
<button class="menu-btn" onclick="toggleSidebar()" title="历史记录">&#9776;</button>
<div class="icon">&#9878;</div>
<div>
<div class="title">法律智能助手</div>
<div class="subtitle">基于 Qwen2.5-7B · 法律领域微调模型</div>
</div>
<div class="status" id="status">检测中...</div>
</div>
<div class="sidebar" id="sidebar">
<div class="sidebar-header">历史对话<button style="background:none;border:none;color:#999;cursor:pointer;font-size:13px" onclick="clearHistory()">清空</button></div>
<ul class="sidebar-list" id="historyList"></ul>
</div>
<div class="chat-area" id="chatArea">
<div class="welcome" id="welcome">
<h2>&#9878; 欢迎使用法律智能助手</h2>
<p>我可以为您提供法律知识咨询、法条解读、维权指导等服务。<br>请注意：本助手回答仅供参考，不构成正式法律意见。</p>
<div class="quick-questions">
<button class="quick-btn" onclick="askQuick(this)">劳动合同到期不续签，有补偿吗？</button>
<button class="quick-btn" onclick="askQuick(this)">租房合同纠纷怎么处理？</button>
<button class="quick-btn" onclick="askQuick(this)">交通事故对方不赔偿怎么办？</button>
<button class="quick-btn" onclick="askQuick(this)">什么是工伤认定？</button>
</div>
</div>
</div>
<div class="input-bar">
<textarea id="input" rows="1" placeholder="请输入您的法律问题..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
<button class="send-btn" id="sendBtn" onclick="send()">发 送</button>
</div>
<script>
var API_URL="/predict";
var chatHistory=JSON.parse(localStorage.getItem("legalChat")||"[]");
renderHistory();
checkHealth();
function checkHealth(){
var el=document.getElementById("status");
fetch("/health").then(function(r){return r.json()}).then(function(d){
if(d.model_loaded){el.textContent="模型已就绪";el.classList.add("ready")}
else{el.textContent="模型加载中...";setTimeout(checkHealth,3000)}
}).catch(function(){el.textContent="连接失败"})
}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open")}
function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px"}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}
function askQuick(btn){document.getElementById("input").value=btn.textContent;send()}
function addMsg(role,text){
var area=document.getElementById("chatArea");
var welcome=document.getElementById("welcome");
if(welcome)welcome.remove();
var div=document.createElement("div");
div.className="msg "+role;
var avatar=role==="user"?"&#9998;":"&#9878;";
div.innerHTML='<div class="avatar">'+avatar+'</div><div class="bubble">'+escapeHtml(text)+'</div>';
area.appendChild(div);
area.scrollTop=area.scrollHeight;
return div
}
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}
function send(){
var input=document.getElementById("input");
var text=input.value.trim();
if(!text)return;
input.value="";input.style.height="auto";
document.getElementById("sendBtn").disabled=true;
addMsg("user",text);
var typing=addMsg("bot","正在分析您的问题，请稍候");
typing.classList.add("typing");
fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:text,max_length:512,temperature:0.7})})
.then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}})})
.then(function(res){
typing.classList.remove("typing");
var bubble=typing.querySelector(".bubble");
if(res.ok&&res.data.answer){
bubble.innerHTML=escapeHtml(res.data.answer);
chatHistory.push({q:text,a:res.data.answer,t:Date.now()});
localStorage.setItem("legalChat",JSON.stringify(chatHistory.slice(-50)));
renderHistory()
}else{bubble.innerHTML="抱歉，回答生成失败："+(res.data.detail||"未知错误")}
}).catch(function(){
typing.classList.remove("typing");
typing.querySelector(".bubble").innerHTML="网络错误，请检查服务是否启动。"
}).finally(function(){document.getElementById("sendBtn").disabled=false;document.getElementById("input").focus()})
}
function renderHistory(){
var list=document.getElementById("historyList");
list.innerHTML="";
chatHistory.slice().reverse().forEach(function(h,idx){
var li=document.createElement("li");
var realIdx=chatHistory.length-1-idx;
li.innerHTML='<span>'+escapeHtml(h.q.substring(0,30))+'</span><span class="del" onclick="event.stopPropagation();delHistory('+realIdx+')">删除</span>';
li.onclick=function(){document.getElementById("input").value=h.q;document.getElementById("sidebar").classList.remove("open")};
list.appendChild(li)
})
}
function delHistory(idx){chatHistory.splice(idx,1);localStorage.setItem("legalChat",JSON.stringify(chatHistory));renderHistory()}
function clearHistory(){chatHistory=[];localStorage.removeItem("legalChat");renderHistory()}
</script>
</body>
</html>
